name: Delegate to Claude
on:
  schedule:
    # 平日 8:00-22:00 JST の間、10分おきにチェック
    # (UTC 23-13 = JST 8:00-22:00)
    - cron: '*/10 23,0-13 * * 0-5'
  workflow_dispatch:

jobs:
  delegate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests PyYAML

      - name: Scan and delegate claude-labeled issues
        env:
          GH_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          SLACK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python scripts/delegate.py
