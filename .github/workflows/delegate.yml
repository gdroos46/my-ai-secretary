name: Delegate to Claude
on:
  schedule:
    # 平日 9:00-19:00 JST の間、15分おきにチェック
    # (UTC 0:00-10:00 = JST 9:00-19:00)
    - cron: '*/15 0-10 * * 1-5'
  workflow_dispatch:

jobs:
  delegate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests PyYAML

      - name: Scan and delegate claude-labeled issues
        env:
          GH_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          SLACK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python scripts/delegate.py
